<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MystiCraft Ticket History</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mc-bg: #151515;
            --mc-btn: #7d7d7d;
            --mc-btn-hover: #9e9e9e;
            --mc-btn-border-light: #c6c6c6;
            --mc-btn-border-dark: #3b3b3b;
            --mc-text: #ffffff;
            --mc-text-shadow: #3f3f3f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'VT323', monospace;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.6) 50%, rgba(0, 0, 0, 0.6) 100%), url('https://ticket.mysticraft.xyz/assets/mysti-banner.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: var(--mc-text);
            font-size: 20px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            z-index: 10;
            position: relative;
        }

        .mc-window {
            background-color: #C6C6C6;
            border: 4px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            image-rendering: pixelated;
            margin-bottom: 20px;
        }

        .mc-title-bar {
            padding: 5px 10px;
            color: #404040;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .mc-panel {
            border: 2px solid;
            border-color: #fff #555 #555 #fff;
            background: #C6C6C6;
            padding: 15px;
            margin: 5px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .header h1 {
            color: #404040;
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .subtitle {
            color: #555;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .header-user {
            color: #555;
            font-size: 15px;
        }
        
        .logout-button {
            background: #A00;
            border: 2px solid;
            border-color: #c6c6c6 #3b3b3b #3b3b3b #c6c6c6;
            color: #fff;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 20px;
            text-decoration: none;
            font-family: 'VT323', monospace;
            text-shadow: 2px 2px #3f3f3f;
            transition: all 0.1s;
        }
        
        .logout-button:hover {
            background: #C00;
        }

        .logout-button:active {
            border-color: #3b3b3b #c6c6c6 #c6c6c6 #3b3b3b;
            padding-top: 10px;
            padding-bottom: 6px;
        }
        
        .tickets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .ticket-card {
            background: #C6C6C6;
            border: 4px solid #000;
            padding: 15px;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .ticket-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px rgba(0,0,0,0.4);
        }
        
        .ticket-card:active {
            transform: translate(1px, 1px);
            box-shadow: 2px 2px 0px rgba(0,0,0,0.2);
        }
        
        .category-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border: 2px solid #404040;
            font-size: 16px;
            font-weight: 600;
            max-width: 100%;
            word-break: break-word;
            text-shadow: 1px 1px rgba(0,0,0,0.3);
        }

        .badge-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }

        .guild-pill {
            display: inline-block;
            background: #8bc34a;
            color: #404040;
            padding: 6px 12px;
            border: 2px solid #404040;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 1px 1px rgba(0,0,0,0.3);
        }

        .guild-pill i,
        .category-badge i {
            margin-right: 6px;
        }
        
        .ticket-date {
            color: #555;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .transcript-link {
            display: inline-block;
            background: #7d7d7d;
            border: 2px solid;
            border-color: #c6c6c6 #3b3b3b #3b3b3b #c6c6c6;
            color: #fff;
            padding: 8px 16px;
            text-decoration: none;
            font-size: 20px;
            font-family: 'VT323', monospace;
            text-shadow: 2px 2px #3f3f3f;
            transition: all 0.1s;
            cursor: pointer;
        }
        
        .transcript-link:hover {
            background: #9e9e9e;
        }

        .transcript-link:active {
            border-color: #3b3b3b #c6c6c6 #c6c6c6 #3b3b3b;
            padding-top: 10px;
            padding-bottom: 6px;
        }
        
        .empty-state {
            background: #C6C6C6;
            border: 4px solid #000;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.3);
        }
        
        .empty-state h2 {
            color: #404040;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .empty-state p {
            color: #555;
            font-size: 20px;
        }

        .error-message {
            background: #fee;
            border: 2px solid #c33;
            color: #c33;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .transcript-link i {
            margin-left: 4px;
            font-size: 14px;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.8) 50%, rgba(0, 0, 0, 0.8) 100%), url('https://ticket.mysticraft.xyz/assets/mysti-banner.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 30px;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-logo {
            font-size: 64px;
            filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.8));
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .loading-container {
            text-align: center;
        }

        .loading-message {
            font-family: 'VT323', monospace;
            color: #fff;
            font-size: 24px;
            text-shadow: 3px 3px rgba(0,0,0,0.8);
            min-height: 30px;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .loading-bar {
            width: 300px;
            height: 20px;
            background: #000;
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            overflow: hidden;
            position: relative;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            width: 0%;
            animation: fillBar 8s steps(50, end) infinite;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        @keyframes fillBar {
            0% { width: 0%; }
            5% { width: 3%; }
            8% { width: 5%; }
            12% { width: 8%; }
            15% { width: 10%; }
            18% { width: 12%; }
            22% { width: 15%; }
            25% { width: 18%; }
            28% { width: 20%; }
            32% { width: 24%; }
            35% { width: 27%; }
            38% { width: 30%; }
            42% { width: 33%; }
            45% { width: 36%; }
            48% { width: 40%; }
            52% { width: 43%; }
            55% { width: 47%; }
            58% { width: 50%; }
            62% { width: 53%; }
            65% { width: 57%; }
            68% { width: 60%; }
            72% { width: 63%; }
            75% { width: 67%; }
            78% { width: 70%; }
            82% { width: 73%; }
            85% { width: 77%; }
            88% { width: 80%; }
            92% { width: 83%; }
            95% { width: 87%; }
            100% { width: 90%; }
        }

        .loading-percent {
            font-family: 'VT323', monospace;
            color: #fff;
            font-size: 18px;
            text-shadow: 2px 2px rgba(0,0,0,0.8);
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-logo">🎫</div>
        <div class="loading-container">
            <div class="loading-message" id="loadingMessage">Connecting to server...</div>
            <div class="loading-bar">
                <div class="loading-bar-fill"></div>
            </div>
            <div class="loading-percent" id="loadingPercent">0%</div>
        </div>
    </div>

    <script>
        const loadingMessages = [
            'Connecting to server...',
            'Loading terrain...',
            'Building terrain...',
            'Retrieving ticket information...',
            'Rendering chunks...',
            'Downloading data...',
            'Processing tickets...',
            'Finalizing connection...',
            'Almost there...'
        ];

        let messageIndex = 0;
        let percentValue = 0;
        let loadingIntervalId = null;

        function updateLoadingMessage() {
            const messageEl = document.getElementById('loadingMessage');
            const percentEl = document.getElementById('loadingPercent');
            
            messageEl.textContent = loadingMessages[messageIndex];
            messageIndex = (messageIndex + 1) % loadingMessages.length;
            
            percentValue = Math.min(percentValue + Math.random() * 20, 95);
            percentEl.textContent = Math.floor(percentValue) + '%';
        }

        loadingIntervalId = setInterval(updateLoadingMessage, 1000 + Math.random() * 1000);

        function hideLoadingScreen() {
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay && !loadingOverlay.classList.contains('hidden')) {
                loadingOverlay.classList.add('hidden');
            }
            if (loadingIntervalId) {
                clearInterval(loadingIntervalId);
            }
        }

        function formatDate(timestamp) {
            try {
                const date = new Date(timestamp);
                if (!isNaN(date.getTime())) {
                    const formatted = date.toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    }) + ' ' + date.toLocaleTimeString('en-US', {
                        hour: '2-digit',
                        minute: '2-digit',
                        hour12: true
                    });
                    return formatted;
                }
            } catch (e) {
                return timestamp;
            }
            return timestamp;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        function renderTickets(tickets) {
            const container = document.getElementById('ticketsContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (!tickets || tickets.length === 0) {
                emptyState.style.display = 'block';
                container.style.display = 'none';
                return;
            }
            
            container.innerHTML = '';
            tickets.forEach(ticket => {
                const ticketCard = document.createElement('div');
                ticketCard.className = 'ticket-card';
                let badgesHtml = '<div class="badge-container">';
                
                if (ticket.guild_name) {
                    badgesHtml += `<div class="guild-pill"><i class="fas fa-server"></i>${escapeHtml(ticket.guild_name)}</div>`;
                }
                badgesHtml += `<div class="category-badge"><i class="fas fa-tag"></i>${escapeHtml(ticket.category)}</div></div>`;
                
                ticketCard.innerHTML = `
                    ${badgesHtml}
                    <div class="ticket-date">Closed at ${formatDate(ticket.date_str)}</div>
                    <a href="${escapeHtml(ticket.transcript_link)}" class="transcript-link" target="_blank">View Transcript <i class="fas fa-external-link-alt"></i></a>
                `;
                container.appendChild(ticketCard);
            });
            
            container.style.display = 'grid';
            emptyState.style.display = 'none';
        }

        function fetchTickets() {
            fetch('/api/tickets')
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        const errorDiv = document.getElementById('errorMessage');
                        if (errorDiv) {
                            errorDiv.textContent = data.error;
                            errorDiv.style.display = 'block';
                        }
                    }
                    renderTickets(data.tickets);
                    
                    const percentEl = document.getElementById('loadingPercent');
                    percentEl.textContent = '100%';
                    
                    setTimeout(hideLoadingScreen, 500);
                })
                .catch(error => {
                    console.error('Error fetching tickets:', error);
                    const errorDiv = document.getElementById('errorMessage');
                    if (errorDiv) {
                        errorDiv.textContent = 'Error loading ticket history: ' + error.message;
                        errorDiv.style.display = 'block';
                    }
                    hideLoadingScreen();
                });
        }

        document.addEventListener('DOMContentLoaded', function() {
            fetchTickets();
        });

        setTimeout(() => {
            hideLoadingScreen();
        }, 30000);
    </script>
    <div class="container">
        <div class="mc-window">
            <div class="mc-title-bar">Ticket History</div>
            <div class="mc-panel">
                <div class="header">
                    <div>
                        <h1>🎫 MystiCraft Support</h1>
                        <p class="subtitle">Take a glance at all your past closed MystiCraft support tickets</p>
                        <p class="header-user"><i class="fas fa-user"></i> Logged in as {{ user.username }}</p>
                    </div>
                    <a href="https://ticket.mysticraft.xyz/logout" class="logout-button">Disconnect</a>
                </div>
                
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <div id="ticketsContainer" class="tickets-grid" style="display: none;"></div>
                
                <div id="emptyState" class="empty-state" style="display: none;">
                    <h2>No Ticket History</h2>
                    <p>You haven't closed any support tickets yet.</p>
                </div>
            </div>
        </div>
    </div>

    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(circle, transparent 50%, #000 150%); z-index: 5;"></div>
</body>
</html>
