<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MystiCraft Ticket History</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --mc-bg: #151515;
            --mc-btn: #7d7d7d;
            --mc-btn-hover: #9e9e9e;
            --mc-btn-border-light: #c6c6c6;
            --mc-btn-border-dark: #3b3b3b;
            --mc-text: #ffffff;
            --mc-text-shadow: #3f3f3f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'VT323', monospace;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.6) 50%, rgba(0, 0, 0, 0.6) 100%), url('https://ticket.mysticraft.xyz/assets/mysti-banner.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--mc-text);
            font-size: 20px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .container {
            width: 100%;
            max-width: 450px;
            z-index: 10;
        }

        .mc-window {
            background-color: #C6C6C6;
            border: 4px solid #000;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            image-rendering: pixelated;
        }

        .mc-title-bar {
            padding: 5px 10px;
            color: #404040;
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .mc-panel {
            border: 2px solid;
            border-color: #fff #555 #555 #fff;
            background: #C6C6C6;
            padding: 15px;
            margin: 5px;
        }
        
        h1 {
            color: #404040;
            margin-bottom: 5px;
            font-size: 32px;
            text-shadow: none;
        }
        
        .subtitle {
            color: #555;
            font-size: 18px;
            margin-bottom: 20px;
        }
        
        .error-message {
            background: #fee;
            border: 2px solid #c33;
            color: #c33;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 18px;
        }
        
        .login-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 10px;
            background: #7d7d7d;
            border: 2px solid;
            border-color: #c6c6c6 #3b3b3b #3b3b3b #c6c6c6;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-shadow: 2px 2px #3f3f3f;
            transition: all 0.1s;
        }
        
        .login-button:hover {
            background: #9e9e9e;
        }

        .login-button:active {
            border-color: #3b3b3b #c6c6c6 #c6c6c6 #3b3b3b;
            padding-top: 12px;
            padding-bottom: 8px;
        }
        
        .discord-icon {
            font-size: 24px;
            filter: drop-shadow(1px 1px 0px rgba(0,0,0,0.5));
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mc-window">
            <div class="mc-title-bar">Ticket History</div>
            <div class="mc-panel">
                <h1>🎫 MystiCraft Support</h1>
                <p class="subtitle">Take a glance at all your past closed MystiCraft support tickets</p>
                
                {% if error %}
                <div class="error-message">{{ error }}</div>
                {% endif %}
                
                <a href="https://ticket.mysticraft.xyz/login" class="login-button">
                    <i class="fab fa-discord discord-icon"></i>
                    Discord Login
                </a>
            </div>
        </div>
    </div>

    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: radial-gradient(circle, transparent 50%, #000 150%); z-index: 5;"></div>
</body>
</html>
